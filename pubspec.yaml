name: image_to_pdf
description: "A modern, lightning-fast utility to convert images to PDFs, merge, split, and compress your documents entirely on-device."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Image picking
  image_picker: ^1.1.2

  # PDF file picking (existing PDFs from device)
  file_picker: ^8.1.2

  # PDF generation & preview
  pdf: ^3.11.1
  printing: ^5.13.1

  # File system & sharing
  path_provider: ^2.1.5
  share_plus: ^10.0.3

  # Reorderable grid
  reorderable_grid_view: ^2.2.4

  # Animations
  flutter_animate: ^4.5.0

  # Utilities
  uuid: ^4.5.1
  equatable: ^2.0.7
  shared_preferences: ^2.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1
  riverpod_generator: ^2.6.1
  build_runner: ^2.4.13
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.1

flutter:
  uses-material-design: false

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  adaptive_icon_background: "#FF3344"
  adaptive_icon_foreground: "assets/icon.png"
